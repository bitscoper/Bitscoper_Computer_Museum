<?xml version="1.0" encoding="UTF-8" ?>
<!-- By Abdullah As-Sadeed -->
<html xmlns="http://www.w3.org/1999/xhtml" lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <title>Bitscoper Computer Museum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Abdullah As-Sadeed" />
    <meta
      name="description"
      content="A PHP-Driven Single-Page XHTML Gallery of Historical Computers"
    />

    <style>
      /* By Abdullah As-Sadeed */

      :root {
        --crust: #11111b;
        --mantle: #181825;
        --base: #1e1e2e;

        --surface0: #313244;
        --surface1: #45475a;
        --surface2: #585b70;

        --overlay0: #6c7086;
        --overlay1: #7f849c;
        --overlay2: #9399b2;

        --subtext0: #a6adc8;
        --subtext1: #bac2de;
        --text: #cdd6f4;

        --lavender: #b4befe;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0px;
        background-color: var(--base);
        line-height: 1.5;
        font-family: system-ui, sans-serif;
        color: var(--text);
      }

      header {
        border-bottom: 1px solid var(--surface0);
        background-color: var(--mantle);
        padding: 3rem 1rem;
        text-align: center;
        color: var(--text);
      }

      h1 {
        margin: 0px;
        color: var(--lavender);
      }

      p {
        color: var(--text);
      }

      input[name="searchInputField"] {
        width: min(500px, 100%);
        border: 1px solid var(--surface0);
        border-radius: 10px;
        background-color: var(--base);
        padding: 0.75rem 1rem;
        font: inherit;
        color: var(--text);
        transition: border-color 0.2s;
      }

      input[name="searchInputField"]:hover,
      input[name="searchInputField"]:focus {
        outline: none;
        border-color: var(--surface2);
      }

      main {
        margin: auto;
        max-width: 1500px;
        padding: 2rem;
      }

      section {
        margin-bottom: 4rem;
      }

      h2 {
        margin-bottom: 1.5rem;
        border-bottom: 2px solid var(--surface1);
        padding-bottom: 0.5rem;
        color: var(--lavender);
      }

      .photographs {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      figure {
        margin: 0px;
        border: 1px solid var(--surface0);
        border-radius: 12px;
        overflow: hidden;
        background-color: var(--mantle);
        transition:
          border-color 0.2s,
          transform 0.2s;
      }

      figure:hover,
      figure:focus {
        border-color: var(--surface2);
        transform: translateY(-8px);
      }

      img {
        display: block;
        width: 100%;
        height: 220px;
        object-fit: fill;
        cursor: pointer;
      }

      figcaption {
        padding: 0.8rem;
        color: var(--text);
      }

      footer {
        border-top: 1px solid var(--surface0);
        background-color: var(--mantle);
        padding: 2rem;
        text-align: center;
        color: var(--text);
      }

      a {
        text-decoration: none;
        color: var(--text);
        cursor: pointer;
        transition: color 0.2s;
      }

      a:hover,
      a:focus {
        color: var(--lavender);
      }
    </style>
  </head>

  <body lang="en-US">
    <header>
      <h1>Bitscoper Computer Museum</h1>
      <p id="counts" />

      <form name="searchForm">
        <input
          type="search"
          name="searchInputField"
          placeholder="Search Computers ..."
          title="Search Computers ..."
          aria-label="Search Computers ..."
          autocomplete="off"
        />
      </form>
    </header>

    <main id="main" />

    <footer>
      <a
        href="https://github.com/bitscoper/Bitscoper_Computer_Museum/"
        target="_blank"
        title="Source Code"
      >
        Source Code
      </a>
    </footer>

    <script>
      /* By Abdullah As-Sadeed */

      "use strict";

      window.onload = function () {
        const countParagraph = window.document.getElementById("counts");

        const initialDocumentTitleString = window.document.title;
        const initialCountParagraphInnerHTML = countParagraph.innerHTML;

        window.document.searchForm.onsubmit = function (submissionEvent) {
          submissionEvent.preventDefault();

          return false;
        };

        window.document.searchForm.searchInputField.oninput = function () {
          const searchString = this.value.trim().toLowerCase();
          let matchCount = 0;

          Array.from(
            window.document.querySelectorAll("main > section"),
          ).forEach(function (section) {
            const match = section
              .querySelector("h2")
              .textContent.toLowerCase()
              .includes(searchString);

            section.hidden = !match;

            if (match) {
              matchCount++;
            }
          });

          if (searchString === "") {
            window.document.title = initialDocumentTitleString;
            countParagraph.innerHTML = initialCountParagraphInnerHTML;
          } else {
            const matchCountSuffixString =
              matchCount === 1 ? "Matching Computer" : "Matching Computers";

            window.document.title =
              matchCount +
              " " +
              matchCountSuffixString +
              " | " +
              initialDocumentTitleString;

            countParagraph.innerHTML =
              initialCountParagraphInnerHTML +
              " | " +
              matchCount +
              " " +
              matchCountSuffixString;
          }
        };

        document.querySelectorAll("figure img").forEach((imageElement) => {
          imageElement.onclick = async function () {
            try {
              if (imageElement.requestFullscreen) {
                await imageElement.requestFullscreen({
                  navigationUI: "hide",
                });
              }
            } catch (error) {
              console.error(error);
            }
          };
        });
      };
    </script>
  </body>
</html>
