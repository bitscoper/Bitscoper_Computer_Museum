<?xml version="1.0" encoding="UTF-8" ?>
<!-- By Abdullah As-Sadeed -->
<html xmlns="http://www.w3.org/1999/xhtml" lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <title>Bitscoper Computer Museum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Abdullah As-Sadeed" />
    <meta
      name="description"
      content="A PHP-Driven Single-Page XHTML Gallery of Historical Computers"
    />

    <style>
      /* By Abdullah As-Sadeed */

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0px;
        background-color: #f4f4f4;
        line-height: 1.5;
        font-family: system-ui, sans-serif;
        color: #222;
      }

      header {
        background-color: #20242a;
        padding: 3rem 1rem;
        text-align: center;
        color: white;
      }

      h1 {
        margin: 0px;
        font-size: 2.5rem;
      }

      header p {
        color: #bbb;
      }

      main {
        margin: auto;
        max-width: 1500px;
        padding: 2rem;
      }

      section {
        margin-bottom: 4rem;
      }

      h2 {
        margin-bottom: 1.5rem;
        border-bottom: 3px solid #ddd;
        padding-bottom: 0.5rem;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      figure {
        margin: 0px;
        background-color: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
      }

      figure:hover {
        transform: translateY(-2px);
        transition: 0.2s;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      img {
        display: block;
        width: 100%;
        height: 220px;
        object-fit: cover;
      }

      figcaption {
        padding: 0.8rem;
        font-size: 0.95rem;
      }

      footer {
        padding: 2rem;
        text-align: center;
        color: #666;
      }
    </style>
  </head>

  <body lang="en-US">
    <header>
      <h1>Bitscoper Computer Museum</h1>
      <p id="counts" />
    </header>

    <main id="main" />

    <footer>
      <a
        href="https://github.com/bitscoper/Bitscoper_Computer_Museum/"
        target="_blank"
        title="Source Code"
      >
        Source Code
      </a>
    </footer>

    <script>
      /* By Abdullah As-Sadeed */
    </script>
  </body>
</html>
