<?xml version="1.0" encoding="UTF-8" ?>
<!-- By Abdullah As-Sadeed -->
<html xmlns="http://www.w3.org/1999/xhtml" lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <title>Bitscoper Computer Museum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Abdullah As-Sadeed" />
    <meta
      name="description"
      content="A PHP-Driven Single-Page XHTML Gallery of Historical Computers"
    />

    <style>
      /* By Abdullah As-Sadeed */

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0px;
        background-color: #f4f4f4;
        line-height: 1.5;
        font-family: system-ui, sans-serif;
        color: #222;
      }

      header {
        background-color: #20242a;
        padding: 3rem 1rem;
        text-align: center;
        color: white;
      }

      h1 {
        margin: 0px;
        font-size: 2.5rem;
      }

      header p {
        color: #bbb;
      }

      form {
        margin-top: 1rem;
      }

      input[name="searchInputField"] {
        width: min(500px, 100%);
        border: none;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        font: inherit;
      }

      input[name="searchInputField"]:hover,
      input[name="searchInputField"]:focus {
        outline: 2px solid #66aaff;
      }

      main {
        margin: auto;
        max-width: 1500px;
        padding: 2rem;
      }

      section {
        margin-bottom: 4rem;
      }

      h2 {
        margin-bottom: 1.5rem;
        border-bottom: 3px solid #ddd;
        padding-bottom: 0.5rem;
      }

      .photographs {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      figure {
        margin: 0px;
        background-color: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
      }

      figure:hover {
        transform: translateY(-2px);
        transition: 0.2s;
      }

      a {
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      img {
        display: block;
        width: 100%;
        height: 220px;
        object-fit: cover;
      }

      figcaption {
        padding: 0.8rem;
        font-size: 0.95rem;
      }

      footer {
        padding: 2rem;
        text-align: center;
        color: #666;
      }
    </style>
  </head>

  <body lang="en-US">
    <header>
      <h1>Bitscoper Computer Museum</h1>
      <p id="counts" />

      <form name="searchForm">
        <input
          type="search"
          name="searchInputField"
          placeholder="Search Computers ..."
          title="Search Computers ..."
          aria-label="Search Computers ..."
          autocomplete="off"
        />
      </form>
    </header>

    <main id="main" />

    <footer>
      <a
        href="https://github.com/bitscoper/Bitscoper_Computer_Museum/"
        target="_blank"
        title="Source Code"
      >
        Source Code
      </a>
    </footer>

    <script>
      /* By Abdullah As-Sadeed */

      "use strict";

      window.onload = function () {
        const countParagraph = window.document.getElementById("counts");

        const initialDocumentTitleString = window.document.title;
        const initialCountParagraphInnerHTML = countParagraph.innerHTML;

        window.document.searchForm.onsubmit = function (submissionEvent) {
          submissionEvent.preventDefault();

          return false;
        };

        window.document.searchForm.searchInputField.oninput = function () {
          const searchString = this.value.trim().toLowerCase();
          let matchCount = 0;

          Array.from(
            window.document.querySelectorAll("main > section"),
          ).forEach(function (section) {
            const match = section
              .querySelector("h2")
              .textContent.toLowerCase()
              .includes(searchString);

            section.hidden = !match;

            if (match) {
              matchCount++;
            }
          });

          if (searchString === "") {
            window.document.title = initialDocumentTitleString;
            countParagraph.innerHTML = initialCountParagraphInnerHTML;
          } else {
            const matchCountSuffixString =
              matchCount === 1 ? "Matching Computer" : "Matching Computers";

            window.document.title =
              matchCount +
              " " +
              matchCountSuffixString +
              " | " +
              initialDocumentTitleString;

            countParagraph.innerHTML =
              initialCountParagraphInnerHTML +
              " | " +
              matchCount +
              " " +
              matchCountSuffixString;
          }
        };
      };
    </script>
  </body>
</html>
