    <style>
      /* By Abdullah As-Sadeed */

      :root {
        --crust: #11111b;
        --mantle: #181825;
        --base: #1e1e2e;

        --surface0: #313244;
        --surface1: #45475a;
        --surface2: #585b70;

        --overlay0: #6c7086;
        --overlay1: #7f849c;
        --overlay2: #9399b2;

        --subtext0: #a6adc8;
        --subtext1: #bac2de;
        --text: #cdd6f4;

        --lavender: #b4befe;
      }

      * {
        box-sizing: border-box;
        outline: none;
        scroll-behavior: smooth;
      }

      html,
      body {
        margin: 0rem;
        height: 100%;
        padding: 0rem;
      }

      body {
        display: flex;
        background-color: var(--base);
        flex-direction: row;
        line-height: 1.5;
        font-family: system-ui, sans-serif;
        color: var(--text);
      }

      aside {
        display: block;
        width: 16rem;
        max-width: fit-content;
        height: 100vh;
        border-top: 1px solid var(--surface0);
        border-bottom: 1px solid var(--surface0);
        border-left: 1px solid var(--surface0);
        background-color: var(--mantle);
        overflow-y: scroll;
        resize: horizontal;
        transition: width 0.2s;
      }

      main {
        flex: 1;
        height: 100vh;
        border: 1px solid var(--surface0);
        overflow-y: scroll;
      }

      @media (max-width: 768px) {
        aside {
          display: none;
        }
      }

      aside nav ul {
        margin: 0rem;
        padding: 0rem;
        list-style: none;
      }

      aside nav ul li {
        margin: 0rem;
        padding: 0rem;
      }

      aside nav ul li a {
        display: block;
        background-color: inherit;
        padding: 1rem;
        text-decoration: none;
        color: var(--text);
        cursor: pointer;
        transition:
          background-color 0.2s,
          color 0.2s;
      }

      aside nav ul li:not(:last-child) a {
        border-bottom: 1px solid var(--surface0);
      }

      aside nav ul li a:hover,
      aside nav ul li a:focus {
        background-color: var(--base);
        color: var(--lavender);
      }

      main header {
        border-bottom: 1px solid var(--surface0);
        background-color: var(--mantle);
        padding: 4rem 1rem 4rem 1rem;
        text-align: center;
        color: var(--text);
      }

      main header h1 {
        margin: 0rem;
        color: var(--lavender);
      }

      main header p {
        margin: 1rem;
        color: var(--text);
      }

      main header form input[type="search"] {
        width: min(24rem, 100%);
        border: 1px solid var(--surface0);
        border-radius: 1rem;
        background-color: var(--base);
        padding: 0.8rem 1rem 0.8rem 1rem;
        font: inherit;
        color: var(--text);
        transition: border-color 0.2s;
      }

      main header form input[type="search"]:hover,
      main header form input[type="search"]:focus {
        border-color: var(--surface2);
      }

      main article {
        margin: auto;
        max-width: 100rem;
      }

      main article section {
        margin: 4rem 2rem 4rem 2rem;
      }

      @media (max-width: 768px) {
        main article section {
          margin: 4rem 1rem 4rem 1rem;
        }
      }

      main article section h2 {
        margin-top: 0rem;
        margin-bottom: 1rem;
        border-bottom: 2px solid var(--surface1);
        padding-bottom: 0.2rem;
        color: var(--lavender);
      }

      main article section div {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(20rem, 1fr));
        gap: 1rem;
      }

      main article section div figure {
        margin: 0rem;
        border: 1px solid var(--surface0);
        border-radius: 1rem;
        background-color: var(--mantle);
        transition:
          border-color 0.2s,
          transform 0.2s;
      }

      main article section div figure:hover,
      main article section div figure:focus {
        border-color: var(--surface2);
        transform: translateY(-0.5rem);
      }

      main article section div figure img {
        display: block;
      }

      main article section div figure img:fullscreen {
        object-fit: contain;
      }

      main article section div figure img:not(:fullscreen) {
        width: 100%;
        height: 16rem;
        object-fit: fill;
        border-top-right-radius: 1rem;
        border-top-left-radius: 1rem;
        cursor: pointer;
      }

      main article section div figure figcaption {
        padding: 1rem;
        color: var(--text);
      }

      main footer {
        border-top: 1px solid var(--surface0);
        background-color: var(--mantle);
        padding: 4rem 1rem 4rem 1rem;
        text-align: center;
        color: var(--text);
      }

      main footer a {
        text-decoration: none;
        color: var(--text);
        cursor: pointer;
        transition: color 0.2s;
      }

      main footer a:hover,
      main footer a:focus {
        color: var(--lavender);
      }

      main button {
        display: flex;
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        width: 3rem;
        height: 3rem;
        border: 1px solid var(--surface0);
        border-radius: 50%;
        background-color: var(--crust);
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 1.6rem;
        color: var(--text);
        cursor: pointer;
        transition:
          right 0.2s,
          bottom 0.2s,
          border 0.2s;
      }

      main button:hover,
      main button:focus {
        border: 1px solid var(--surface2);
      }

      @media (max-width: 768px) {
        main button {
          right: 0.4rem;
          bottom: 0.4rem;
        }
      }
    </style>
  </head>

  <body lang="en-US">
    <aside>
      <nav />
    </aside>

    <main>
      <header>
        <h1>Bitscoper Computer Museum</h1>
        <p id="counts" />

        <form name="searchForm">
          <input
            type="search"
            name="searchInputField"
            placeholder="Search Computers ..."
            title="Search Computers ..."
            aria-label="Search Computers ..."
            autocomplete="off"
          />
        </form>
      </header>

      <article />

      <footer>
        <a
          href="https://www.ssllabs.com/ssltest/analyze.html?d=computer-museum.bitscoper.dev"
          title="Check TLS Certificate"
          target="_blank"
          >Check TLS Certificate</a
        >
        |
        <a
          href="https://securityheaders.com/?q=https%3A%2F%2Fcomputer-museum.bitscoper.dev%2F&followRedirects=on"
          title="Check Security Headers"
          target="_blank"
          >Check Security Headers</a
        >
        |
        <a
          href="https://hstspreload.org/?domain=computer-museum.bitscoper.dev#submission-form"
          title="Check HSTS Preload Status"
          target="_blank"
          >Check HSTS Preload Status</a
        >
        |
        <a
          href="https://validator.w3.org/nu/?doc=https%3A%2F%2Fcomputer-museum.bitscoper.dev%2F&checkerrorpages=yes&showsource=yes&showoutline=yes"
          title="Validate Markup"
          target="_blank"
          >Validate Markup</a
        >
        |
        <a
          href="https://pagespeed.web.dev/analysis?url=https%3A%2F%2Fcomputer-museum.bitscoper.dev%2F"
          title="Check by PageSpeed Insights"
          target="_blank"
        >
          Check by PageSpeed Insights
        </a>
        |
        <a
          href="https://www.pwabuilder.com/reportcard?site=https://computer-museum.bitscoper.dev/"

        <a

          title="Validate security.txt"
          target="_blank"
          >Validate security.txt</a
        >
        |
        <a
          href="https://isitagentready.com/computer-museum.bitscoper.dev"
          title="Check Agent Readiness"
          target="_blank"
          >Check Agent Readiness</a
        >
        <br />
        <br />
        <a
          href="https://github.com/bitscoper/Bitscoper_Computer_Museum/"
          title="Source Code"
          target="_blank"
        >
          Source Code
        </a>
      </footer>

      <button title="Toggle Visibility of Navigation">☷</button>
    </main>

    <script>
      /* By Abdullah As-Sadeed */

      "use strict";

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/Service_Worker.js");
      }

      window.onload = function () {
        const countParagraph = window.document.getElementById("counts");

        const initialDocumentTitleString = window.document.title;
        const initialCountParagraphText = countParagraph.textContent;

        window.document.forms["searchForm"].onsubmit = function (
          submissionEvent,
        ) {
          submissionEvent.preventDefault();

          return false;
        };

        window.document.forms["searchForm"].searchInputField.oninput =
          function () {
            const searchString = this.value.trim().toLowerCase();
            let matchCount = 0;

            Array.from(
              window.document.querySelectorAll("main article section"),
            ).forEach(function (section) {
              const match = section
                .querySelector("h2")
                .textContent.toLowerCase()
                .includes(searchString);

              section.hidden = !match;

              if (match) {
                matchCount++;
              }
            });

            if (searchString === "") {
              window.document.title = initialDocumentTitleString;
              countParagraph.textContent = initialCountParagraphText;
            } else {
              const matchCountSuffixString =
                matchCount === 1 ? "Matching Computer" : "Matching Computers";

              window.document.title =
                matchCount +
                " " +
                matchCountSuffixString +
                " | " +
                initialDocumentTitleString;

              countParagraph.textContent =
                initialCountParagraphText +
                " | " +
                matchCount +
                " " +
                matchCountSuffixString;
            }
          };

        document
          .querySelectorAll("main article section div figure img")
          .forEach((imageElement) => {
            imageElement.onclick = async function () {
              try {
                if (imageElement.requestFullscreen) {
                  await imageElement.requestFullscreen({
                    navigationUI: "hide",
                  });
                }
              } catch (error) {
                console.error(error);
              }
            };
          });

        const asideElement = window.document.getElementsByTagName("aside")[0];
        window.document.querySelector("main button").onclick = function () {
          asideElement.style.display =
            asideElement.style.display == "none" ? "block" : "none";
        };
      };
    </script>
  </body>
</html>
